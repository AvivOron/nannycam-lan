<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NannyCam</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d0d0f;
    --surface: #18181b;
    --surface2: #1f1f23;
    --border: #27272a;
    --text: #fafafa;
    --muted: #71717a;
    --accent: #6366f1;
    --danger: #ef4444;
    --success: #22c55e;
    --warning: #f59e0b;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    width: 30px; height: 30px;
    background: var(--accent);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  header h1 span { font-size: 11px; color: var(--muted); font-weight: 400; margin-left: 4px; }

  /* Role select */
  .role-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 40px 24px;
  }
  .role-screen p { color: var(--muted); font-size: 14px; margin-bottom: 8px; }
  .role-cards { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .role-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 36px;
    cursor: pointer;
    text-align: center;
    transition: border-color 0.15s, transform 0.1s;
    min-width: 150px;
  }
  .role-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .role-card:active { transform: translateY(0); }
  .role-card .icon { font-size: 30px; margin-bottom: 10px; }
  .role-card .label { font-size: 15px; font-weight: 600; }
  .role-card .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* Stream layout */
  .stream-ui {
    width: 100%;
    max-width: 860px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .video-wrap {
    position: relative;
    width: 100%;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    aspect-ratio: 16/9;
  }
  video, #viewer-img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .video-badge {
    position: absolute;
    top: 10px; left: 10px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 3px 9px;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 5px;
    letter-spacing: 0.5px;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--danger); animation: blink 1.5s infinite; }
  @keyframes blink { 0%,100% { opacity:1 } 50% { opacity:0.25 } }

  .controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  .btn {
    padding: 9px 18px;
    font-size: 13px;
    font-weight: 600;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-record { background: var(--danger); color: #fff; }
  .btn-record.recording { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; }
  .btn-danger-ghost { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-warning-ghost { background: transparent; color: var(--warning); border: 1px solid var(--warning); }

  #timer { font-size: 13px; font-variant-numeric: tabular-nums; color: var(--muted); min-width: 80px; }

  .progress-wrap { width: 100%; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; display: none; }
  #progress-fill { height: 100%; background: var(--danger); width: 0%; transition: width 0.4s linear; }

  .status { font-size: 13px; color: var(--muted); }
  .status.live { color: var(--success); }

  /* Timelapse panel */
  .tl-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .tl-panel-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* New timelapse form */
  .tl-new-form { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .tl-select {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 8px 12px;
    font-size: 13px;
    cursor: pointer;
    -webkit-appearance: none;
  }
  .tl-select:disabled { opacity: 0.4; cursor: not-allowed; }
  .tl-arrow { color: var(--muted); font-size: 13px; }
  .tl-calc-hint { font-size: 12px; color: var(--muted); white-space: nowrap; }

  /* Timelapse list */
  .tl-list { display: flex; flex-direction: column; gap: 8px; }
  .tl-empty { font-size: 13px; color: var(--muted); text-align: center; padding: 8px 0; }
  .tl-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }
  .tl-item-left { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .tl-item-meta { font-size: 12px; color: var(--muted); }
  .tl-item-stat { font-size: 13px; font-weight: 500; }
  .tl-item-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .tl-item-status { font-size: 12px; color: var(--muted); }
  .tl-item-status.encoding { color: var(--warning); }
  .tl-item-status.done { color: var(--success); }
</style>
</head>
<body>

<header>
  <div class="logo">📷</div>
  <h1>NannyCam <span>LAN</span></h1>
</header>

<div class="role-screen" id="role-select">
  <p>What are you opening this on?</p>
  <div class="role-cards">
    <div class="role-card" onclick="startBroadcaster()">
      <div class="icon">🖥️</div>
      <div class="label">Broadcast</div>
      <div class="hint">Computer with camera</div>
    </div>
    <div class="role-card" onclick="startViewer()">
      <div class="icon">📱</div>
      <div class="label">Watch</div>
      <div class="hint">Phone or remote device</div>
    </div>
  </div>
</div>

<!-- Broadcaster -->
<div class="stream-ui" id="broadcaster-ui" style="display:none;">
  <div class="video-wrap">
    <video id="local-video" autoplay muted playsinline></video>
    <div class="video-badge"><div class="dot"></div> LIVE</div>
  </div>
  <div class="status" id="bc-status">Starting...</div>
  <div class="tl-panel" id="bc-tl-panel">
    <div class="tl-panel-title">Timelapses</div>
    <div class="tl-list" id="bc-tl-list"></div>
  </div>
  <div class="tl-panel" id="bc-rec-panel">
    <div class="tl-panel-title">WIP Recordings</div>
    <div class="tl-list" id="bc-rec-list"></div>
  </div>
</div>

<!-- Viewer -->
<div class="stream-ui" id="viewer-ui" style="display:none;">
  <div class="video-wrap">
    <img id="viewer-img" alt="">
  </div>
  <div class="progress-wrap" id="progress-bar"><div id="progress-fill"></div></div>
  <div class="controls">
    <button class="btn btn-record" id="record-btn" onclick="toggleRecording()">⏺ Record</button>
    <select id="record-duration" class="tl-select" onchange="updateRecordDuration()">
      <option value="10">10 sec</option>
      <option value="30" selected>30 sec</option>
      <option value="60">1 min</option>
      <option value="120">2 min</option>
      <option value="300">5 min</option>
      <option value="600">10 min</option>
    </select>
    <span id="timer"></span>
  </div>
  <div class="status" id="viewer-status">Connecting...</div>

  <!-- Timelapse panel -->
  <div class="tl-panel">
    <div class="tl-panel-title">Timelapse</div>
    <div class="tl-new-form">
      <select id="tl-duration" class="tl-select" onchange="updateTlCalc()">
        <option value="1">1 hour</option>
        <option value="2">2 hours</option>
        <option value="4">4 hours</option>
        <option value="8">8 hours</option>
        <option value="9" selected>9 hours</option>
        <option value="12">12 hours</option>
        <option value="24">24 hours</option>
      </select>
      <span class="tl-arrow">→</span>
      <select id="tl-output" class="tl-select" onchange="updateTlCalc()">
        <option value="15">15 sec</option>
        <option value="30" selected>30 sec</option>
        <option value="60">1 min</option>
        <option value="120">2 min</option>
      </select>
      <span class="tl-calc-hint" id="tl-calc-hint">= 1 frame / 36s</span>
      <button class="btn btn-accent" id="tl-start-btn" onclick="startTimelapse()">⏱ Start</button>
    </div>
    <div class="tl-list" id="viewer-tl-list"></div>
  </div>
</div>

<script>
let MAX_RECORD_SEC = 30;
const FRAME_INTERVAL = 100;
let ws;
let currentRole = null;
let recording = false;
let recordStart = 0;
let timerInterval;

// Timelapse state (client mirror of server state)
const tlMap = new Map(); // id -> { id, intervalSec, frameCount, estSec, startTime, status }

// Recording state (client mirror of server state)
const recMap = new Map(); // id -> { id, durationSec, frameCount, startTime, status }

function connect(role) {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.binaryType = 'arraybuffer';
  const statusId = role === 'broadcaster' ? 'bc-status' : 'viewer-status';
  ws.onopen = () => {
    ws.send(role);
    document.getElementById(statusId).textContent =
      role === 'broadcaster' ? 'Streaming — viewers can now connect.' : 'Connected. Waiting for stream...';
  };
  ws.onclose = () => {
    document.getElementById(statusId).textContent = 'Disconnected. Refresh to reconnect.';
  };
  ws.onmessage = (event) => {
    // Text = JSON control message
    if (typeof event.data === 'string') {
      try { handleServerMessage(JSON.parse(event.data)); } catch {}
      return;
    }
    // Binary = video/audio frame (viewer only)
    if (role === 'viewer') handleBinaryFrame(event.data);
  };
  return ws;
}

// ─── Timelapse shared ─────────────────────────────────────────────────────────

function handleServerMessage(msg) {
  switch (msg.cmd) {
    case 'tl-list':
      tlMap.clear();
      for (const tl of msg.timelapses) tlMap.set(tl.id, { ...tl, status: 'capturing' });
      renderTlLists();
      break;
    case 'tl-new':
      tlMap.set(msg.tl.id, { ...msg.tl, status: 'capturing' });
      renderTlLists();
      break;
    case 'tl-status': {
      const tl = tlMap.get(msg.id);
      if (tl) { tl.frameCount = msg.frames; tl.estSec = msg.estSec; renderTlLists(); }
      break;
    }
    case 'tl-encoding': {
      const tl = tlMap.get(msg.id);
      if (tl) { tl.status = 'encoding'; tl.frameCount = msg.frames; renderTlLists(); }
      break;
    }
    case 'tl-done': {
      const tl = tlMap.get(msg.id);
      if (tl) { tl.status = 'done'; tl.filename = msg.filename; renderTlLists(); }
      // Auto-remove done entries after 10s
      setTimeout(() => { tlMap.delete(msg.id); renderTlLists(); }, 10000);
      break;
    }
    case 'tl-error': {
      const tl = tlMap.get(msg.id);
      if (tl) { tl.status = 'error'; tl.errorMsg = msg.msg; renderTlLists(); }
      setTimeout(() => { tlMap.delete(msg.id); renderTlLists(); }, 10000);
      break;
    }
    case 'tl-cancelled':
      tlMap.delete(msg.id);
      renderTlLists();
      break;

    case 'rec-list':
      recMap.clear();
      for (const rec of msg.recordings) recMap.set(rec.id, { ...rec, status: 'recording' });
      renderRecordingStatus();
      if (currentRole === 'viewer') {
        // Viewer may be reconnecting to active recordings
        for (const rec of recMap.values()) {
          if (rec.status === 'recording') {
            recording = true;
            recordStart = rec.startTime;
            document.getElementById('record-btn').textContent = '⏹ Stop';
            document.getElementById('record-btn').classList.add('recording');
            document.getElementById('progress-bar').style.display = 'block';
            currentRecordingId = rec.id;
            startRecordingTimer(rec.id, rec.durationSec);
            break;
          }
        }
      }
      break;
    case 'rec-new':
      recMap.set(msg.rec.id, { ...msg.rec, status: 'recording' });
      renderRecordingStatus();
      if (currentRole === 'viewer') {
        recording = true;
        recordStart = msg.rec.startTime;
        document.getElementById('record-btn').textContent = '⏹ Stop';
        document.getElementById('record-btn').classList.add('recording');
        document.getElementById('progress-bar').style.display = 'block';
        startRecordingTimer(msg.rec.id, msg.rec.durationSec);
      }
      break;
    case 'rec-status': {
      const rec = recMap.get(msg.id);
      if (rec) { rec.frameCount = msg.frames; renderRecordingStatus(); }
      break;
    }
    case 'rec-encoding': {
      const rec = recMap.get(msg.id);
      if (rec) { rec.status = 'encoding'; rec.frameCount = msg.frames; renderRecordingStatus(); }
      break;
    }
    case 'rec-done': {
      const rec = recMap.get(msg.id);
      if (rec) { rec.status = 'done'; rec.filename = msg.filename; renderRecordingStatus(); }
      if (currentRole === 'viewer') {
        recording = false;
        clearInterval(timerInterval);
        document.getElementById('record-btn').textContent = '⏺ Record';
        document.getElementById('record-btn').classList.remove('recording');
        document.getElementById('progress-bar').style.display = 'none';
        document.getElementById('progress-fill').style.width = '0%';
        document.getElementById('timer').textContent = '';
        document.getElementById('viewer-status').textContent = `Saved: ${msg.filename}`;
      }
      setTimeout(() => { recMap.delete(msg.id); renderRecordingStatus(); }, 10000);
      break;
    }
    case 'rec-error': {
      const rec = recMap.get(msg.id);
      if (rec) { rec.status = 'error'; rec.errorMsg = msg.msg; renderRecordingStatus(); }
      if (currentRole === 'viewer') {
        recording = false;
        clearInterval(timerInterval);
        document.getElementById('record-btn').textContent = '⏺ Record';
        document.getElementById('record-btn').classList.remove('recording');
        document.getElementById('progress-bar').style.display = 'none';
        document.getElementById('viewer-status').textContent = `Error: ${msg.msg}`;
      }
      setTimeout(() => { recMap.delete(msg.id); renderRecordingStatus(); }, 10000);
      break;
    }
    case 'rec-cancelled':
      if (currentRole === 'viewer') {
        recording = false;
        clearInterval(timerInterval);
        document.getElementById('record-btn').textContent = '⏺ Record';
        document.getElementById('record-btn').classList.remove('recording');
        document.getElementById('progress-bar').style.display = 'none';
      }
      recMap.delete(msg.id);
      renderRecordingStatus();
      break;
  }
}

function renderTlLists() {
  renderTlList('bc-tl-list');
  renderTlList('viewer-tl-list');
}

function renderRecordingStatus() {
  // Show WIP recordings in broadcaster panel
  const bcRecList = document.getElementById('bc-rec-list');
  if (!bcRecList) return;

  if (recMap.size === 0) {
    bcRecList.innerHTML = '<div class="tl-empty">No active recordings</div>';
    return;
  }

  bcRecList.innerHTML = '';
  for (const rec of recMap.values()) {
    const age = Math.floor((Date.now() - rec.startTime) / 1000);
    const frames = rec.frameCount || 0;
    const sizeEst = (frames * 300 / 1024 / 1024).toFixed(1); // ~300KB per frame estimate

    let statusHtml = '';
    let actionsHtml = '';
    if (rec.status === 'recording') {
      statusHtml = '<span class="tl-item-status">Recording</span>';
    } else if (rec.status === 'encoding') {
      statusHtml = '<span class="tl-item-status encoding">Encoding…</span>';
    } else if (rec.status === 'done') {
      statusHtml = '<span class="tl-item-status done">✓ Done</span>';
      actionsHtml = `<a href="/recordings/${rec.filename}" class="btn btn-sm btn-accent" target="_blank">▶ Open</a>`;
    } else if (rec.status === 'error') {
      statusHtml = `<span class="tl-item-status" style="color:var(--danger)">Error</span>`;
    }

    const div = document.createElement('div');
    div.className = 'tl-item';
    div.dataset.id = rec.id;
    div.innerHTML = `
      <div class="tl-item-left">
        <div class="tl-item-meta">Max ${rec.durationSec}s · ${age}s elapsed</div>
        <div class="tl-item-stat">${frames} frames → ~${sizeEst} MB</div>
      </div>
      <div class="tl-item-right">
        ${statusHtml}
        ${actionsHtml}
      </div>
    `;
    bcRecList.appendChild(div);
  }
}

function renderTlList(elId) {
  const el = document.getElementById(elId);
  if (!el) return;

  if (tlMap.size === 0) {
    el.innerHTML = '<div class="tl-empty">No active timelapses</div>';
    return;
  }

  el.innerHTML = '';
  for (const tl of tlMap.values()) {
    const age = Math.floor((Date.now() - tl.startTime) / 60000);
    const ageStr = age < 1 ? 'just now' : `${age}m ago`;
    const frames = tl.frameCount || 0;
    const est = tl.estSec || (frames / 30).toFixed(1);

    let statusHtml = '';
    let actionsHtml = '';

    if (tl.status === 'capturing') {
      statusHtml = '<span class="tl-item-status">Capturing</span>';
      actionsHtml = `
        <button class="btn btn-sm btn-warning-ghost" onclick="saveTimelapse('${tl.id}')">Save</button>
        <button class="btn btn-sm btn-danger-ghost" onclick="cancelTimelapse('${tl.id}')">Cancel</button>
      `;
    } else if (tl.status === 'encoding') {
      statusHtml = '<span class="tl-item-status encoding">Encoding…</span>';
    } else if (tl.status === 'done') {
      statusHtml = `<span class="tl-item-status done">✓ ${tl.filename}</span>`;
    } else if (tl.status === 'error') {
      statusHtml = `<span class="tl-item-status" style="color:var(--danger)" title="${tl.errorMsg}">Error</span>`;
    }

    const div = document.createElement('div');
    div.className = 'tl-item';
    div.dataset.id = tl.id;
    div.innerHTML = `
      <div class="tl-item-left">
        <div class="tl-item-meta">1 frame / ${tl.intervalSec}s · started ${ageStr}</div>
        <div class="tl-item-stat">${frames} frames → ~${est}s video</div>
      </div>
      <div class="tl-item-right">
        ${statusHtml}
        ${actionsHtml}
      </div>
    `;
    el.appendChild(div);
  }
}

function saveTimelapse(id) {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ cmd: 'tl-stop', id }));
}

function cancelTimelapse(id) {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ cmd: 'tl-cancel', id }));
}

// ─── Broadcaster ──────────────────────────────────────────────────────────────

function encodeWAV(samples, sampleRate) {
  const buf = new ArrayBuffer(44 + samples.length * 2);
  const view = new DataView(buf);
  const str = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
  str(0, 'RIFF'); view.setUint32(4, 36 + samples.length * 2, true);
  str(8, 'WAVE'); str(12, 'fmt '); view.setUint32(16, 16, true);
  view.setUint16(20, 1, true); view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true); view.setUint16(34, 16, true);
  str(36, 'data'); view.setUint32(40, samples.length * 2, true);
  let off = 44;
  for (let i = 0; i < samples.length; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    off += 2;
  }
  return buf;
}

async function startBroadcaster() {
  currentRole = 'broadcaster';
  document.getElementById('role-select').style.display = 'none';
  document.getElementById('broadcaster-ui').style.display = 'flex';

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: true
  });
  document.getElementById('local-video').srcObject = stream;
  connect('broadcaster');

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const video = document.getElementById('local-video');

  setInterval(() => {
    if (!ws || ws.readyState !== 1) return;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    canvas.toBlob(async (blob) => {
      if (!blob || ws.readyState !== 1) return;
      const ab = await blob.arrayBuffer();
      const tagged = new Uint8Array(1 + ab.byteLength);
      tagged[0] = 0x01;
      tagged.set(new Uint8Array(ab), 1);
      ws.send(tagged.buffer);
    }, 'image/jpeg', 0.7);
  }, FRAME_INTERVAL);

  const audioCtx = new AudioContext();
  const source = audioCtx.createMediaStreamSource(stream);
  const processor = audioCtx.createScriptProcessor(8192, 1, 1);
  processor.onaudioprocess = (e) => {
    if (!ws || ws.readyState !== 1) return;
    const wav = encodeWAV(e.inputBuffer.getChannelData(0), audioCtx.sampleRate);
    const tagged = new Uint8Array(1 + wav.byteLength);
    tagged[0] = 0x02;
    tagged.set(new Uint8Array(wav), 1);
    ws.send(tagged.buffer);
  };
  source.connect(processor);
  processor.connect(audioCtx.destination);
}

// ─── Viewer ───────────────────────────────────────────────────────────────────

let audioContext;
let audioDestNode;
let audioScheduledUntil = 0;

function scheduleBuffer(buffer) {
  const source = audioContext.createBufferSource();
  source.buffer = buffer;
  source.connect(audioContext.destination);
  if (audioDestNode) source.connect(audioDestNode);
  const now = audioContext.currentTime;
  if (audioScheduledUntil < now) audioScheduledUntil = now + 0.05;
  source.start(audioScheduledUntil);
  audioScheduledUntil += buffer.duration;
}

function playAudioChunk(chunk) {
  if (!audioContext) return;
  if (audioContext.state === 'suspended') audioContext.resume();
  audioContext.decodeAudioData(chunk.slice(0), (buffer) => scheduleBuffer(buffer), () => {});
}

function handleBinaryFrame(data) {
  const bytes = new Uint8Array(data);
  const type = bytes[0];
  const payload = bytes.slice(1);

  if (type === 0x01) {
    const blob = new Blob([payload], { type: 'image/jpeg' });
    const url = URL.createObjectURL(blob);
    const img = document.getElementById('viewer-img');
    const oldSrc = img.src;
    img.src = url;
    if (oldSrc && oldSrc.startsWith('blob:')) URL.revokeObjectURL(oldSrc);
    const s = document.getElementById('viewer-status');
    s.textContent = 'Live';
    s.className = 'status live';
  } else if (type === 0x02) {
    const chunk = payload.buffer.slice(payload.byteOffset, payload.byteOffset + payload.byteLength);
    playAudioChunk(chunk);
  }
}

function startViewer() {
  currentRole = 'viewer';
  document.getElementById('role-select').style.display = 'none';
  document.getElementById('viewer-ui').style.display = 'flex';

  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  audioDestNode = audioContext.createMediaStreamDestination();

  connect('viewer');
  updateTlCalc();
  updateRecordDuration();
}

// ─── Recording duration ────────────────────────────────────────────────────────

function updateRecordDuration() {
  MAX_RECORD_SEC = parseInt(document.getElementById('record-duration').value, 10);
}

// ─── Timelapse (viewer start) ─────────────────────────────────────────────────

function updateTlCalc() {
  const hours = parseFloat(document.getElementById('tl-duration').value);
  const outSec = parseFloat(document.getElementById('tl-output').value);
  const intervalSec = Math.max(1, Math.round((hours * 3600) / (outSec * 30)));
  const hint = intervalSec < 60
    ? `= 1 frame / ${intervalSec}s`
    : `= 1 frame / ${Math.floor(intervalSec / 60)}m${intervalSec % 60 ? (intervalSec % 60) + 's' : ''}`;
  document.getElementById('tl-calc-hint').textContent = hint;
}

function startTimelapse() {
  const hours = parseFloat(document.getElementById('tl-duration').value);
  const outSec = parseFloat(document.getElementById('tl-output').value);
  const intervalSec = Math.max(1, Math.round((hours * 3600) / (outSec * 30)));
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ cmd: 'tl-start', intervalSec }));
}

// ─── Recording ────────────────────────────────────────────────────────────────

let currentRecordingId = null;

function toggleRecording() {
  if (!recording) startRecording();
  else stopRecording();
}

function startRecording() {
  const durationSec = MAX_RECORD_SEC;
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ cmd: 'rec-start', durationSec }));
  }
}

function stopRecording() {
  if (!currentRecordingId) return;
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ cmd: 'rec-stop', id: currentRecordingId }));
  }
}

function startRecordingTimer(id, durationSec) {
  currentRecordingId = id;
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - recordStart) / 1000);
    document.getElementById('timer').textContent = `${elapsed}s / ${durationSec}s`;
    document.getElementById('progress-fill').style.width = `${(elapsed / durationSec) * 100}%`;
  }, 500);
}
</script>
